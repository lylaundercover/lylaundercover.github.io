<div style="position:relative; height:500px;"> <img src="playbutton.png" id="playImage" style="cursor:pointer; width:100px; position:absolute; top:15px; right:235px;">

<audio id="myAudio">
  <source src="Mына минтип - COEMS SONG - Съездбек Искеналиев - Spotimate.app.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("myAudio");
const image = document.getElementById("playImage");

image.addEventListener("click", async () => {
  try {
    if (audio.paused) {
      await audio.play();
    } else {
      audio.pause();
    }
  } catch (err) {
    console.log("Audio failed to play:", err);
  }
});
</script> </div>
