<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title> OUR CHAT ROOM </title>
<style>
body{margin:0;background:#ff0090;font-family:Arial;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
#win{width:720px;background:#111;border:4px solid #ff66c4;border-radius:12px;overflow:hidden;box-shadow:0 0 20px #ff66c4}
#bar{background:linear-gradient(90deg,#ff0090,#ff66c4);padding:12px;font-weight:bold}
#msgs{height:380px;overflow-y:auto;padding:15px;background:#1b1b1b}
.msg{margin:8px 0;padding:8px;background:#2b2b2b;border-left:4px solid #ff66c4;border-radius:6px}
.name{color:#ff8fd6;font-weight:bold}.time{font-size:11px;color:#bbb}
#ctrl{display:flex;gap:8px;padding:12px;background:#222}
input{padding:10px;border:none;border-radius:8px;background:#333;color:#fff}
#user{width:140px}#text{flex:1}button{padding:10px 16px;background:#ff0090;color:#fff;border:none;border-radius:8px;cursor:pointer}
</style></head><body>
<div id="win"><div id="bar">💬 OUR CHAT ROOM</div><div id="msgs"></div>
<div id="ctrl"><input id="user" placeholder="Username"><input id="text" placeholder="Type a message..."><button id="send">Send</button></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore,collection,addDoc,query,orderBy,onSnapshot,serverTimestamp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyD6xMt94Boojw4ZXP1qu3VBx_x067Oarxs",
authDomain:"chat-room-224bd.firebaseapp.com",
projectId:"chat-room-224bd",
storageBucket:"chat-room-224bd.firebasestorage.app",
messagingSenderId:"764721419755",
appId:"1:764721419755:web:097528ac4576ede2c035ae",
measurementId:"G-SKH934984V"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const box=document.getElementById("msgs");

const q=query(collection(db,"messages"),orderBy("created"));
onSnapshot(q,snap=>{
 box.innerHTML="";
 snap.forEach(doc=>{
  const d=doc.data();
  const div=document.createElement("div");
  div.className="msg";
  const t=d.created?.toDate?d.created.toDate().toLocaleTimeString():"";
  const name=document.createElement("div");
name.className="name";
name.textContent=d.user || "Guest";

const text=document.createElement("div");
text.textContent=d.text || "";

const time=document.createElement("div");
time.className="time";
time.textContent=t;

div.append(name,text,time);
  box.appendChild(div);
 });
 box.scrollTop=box.scrollHeight;
});

async function send(){
 const user=document.getElementById("user").value.trim()||"Guest";
 const text=document.getElementById("text").value.trim();
 if(!text)return;
 await addDoc(collection(db,"messages"),{user,text,created:serverTimestamp()});
 document.getElementById("text").value="";
}
document.getElementById("send").onclick=send;
document.getElementById("text").addEventListener("keydown",e=>{if(e.key==="Enter")send();});
const userInput=document.getElementById("user");

userInput.value=localStorage.getItem("username") || "";

userInput.addEventListener("change",()=>{
    localStorage.setItem("username",userInput.value);
});
</script>
</body></html>
