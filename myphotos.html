<body>

<div class="gallery">
    <button onclick="previousImage()">◀ Previous</button>

    <img id="galleryImage" src="thevibes.jpg">

    <button onclick="nextImage()">Next ▶</button>
</div>

<script>
// List your images here
const images = [
    "thevibes.jpg",
    "RHONDA.jpg",
    "pinkyupduhduhduh.jpg",
    "meposing.jpg"
    ,"meandnat.jpg",
    "meandmichael.jpg",
    "guardandwhatnot.jpg",
    "city.jpg",
    "buccasomething.jpg"
];

let currentImage = 0;

function showImage(){
    document.getElementById("galleryImage").src = images[currentImage];
}

function nextImage(){
    currentImage++;
    if(currentImage >= images.length){
        currentImage = 0; // Go back to the first image
    }
    showImage();
}

function previousImage(){
    currentImage--;
    if(currentImage < 0){
        currentImage = images.length - 1; // Go to the last image
    }
    showImage();
}
</script>
